<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Pulse</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <img src="profile.jpg" alt="Pulse" class="auth-logo">
        <h1>Join Pulse</h1>
        <p>Track your life, own your progress</p>
      </div>
      
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div id="clerk-signin" style="display: block;"></div>
      <div id="clerk-signup" style="display: none;"></div>
      
      <div id="auth-error" class="auth-error"></div>
    </div>
  </div>

  <script src="https://unpkg.com/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
